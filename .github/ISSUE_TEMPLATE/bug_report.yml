name: 🐞 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: north version
      description: Output of `north status` (or the version in package.json).
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options: [Claude Code, Codex, Gemini CLI, Terminal only, Other]
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What you did, what you expected, what happened instead. Include exact commands and output.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
  - type: checkboxes
    id: hygiene
    attributes:
      label: Confirmations
      options:
        - label: I removed any private paths, tokens, or internal names from the output above.
          required: true
