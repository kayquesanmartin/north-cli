name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? What's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like north to do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Focus / vital signs, Dashboard, Runtime integration, Install / setup, GSD interop, Docs, Other]
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
