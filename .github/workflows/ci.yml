name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  compile:
    name: compile (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.8", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Byte-compile the engine
        run: python -m compileall -q install.py runtimes.py src
      - name: Run unit tests (stdlib unittest)
        run: python -m unittest discover -s tests -p "test_*.py"

  smoke:
    name: install smoke (isolated HOME)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install all runtimes into a throwaway HOME and verify the engine
        run: |
          export HOME="$(mktemp -d)"
          node bin/north.js install \
            --runtimes claude,codex,gemini --scope global \
            --scan-root "$PWD" --all --skip-plugins --no-statusline --no-build
          test -f "$HOME/.north/run.py"
          # English primary names
          test -f "$HOME/.codex/prompts/north-focus.md"
          test -f "$HOME/.gemini/commands/north/focus.toml"
          # pt-BR legacy aliases still generated
          test -f "$HOME/.codex/prompts/north-foco.md"
          test -f "$HOME/.gemini/commands/north/foco.toml"
          # Claude skills are namespaced north-*
          test -d "$HOME/.claude/skills/north-focus"
          test -d "$HOME/.claude/skills/north-status"
          test ! -d "$HOME/.claude/skills/focus"
          # behavior skill (mentor mode) — no engine call in Codex prompt
          test -d "$HOME/.claude/skills/north-learn"
          test -f "$HOME/.codex/prompts/north-learn.md"
          ! grep -q "run.py" "$HOME/.codex/prompts/north-learn.md"
          # live-panel hook registered in settings.json
          grep -q "north_hook.py" "$HOME/.claude/settings.json"
          python "$HOME/.north/run.py" status
          # uninstall round-trip (remove tudo, preserva dados por padrão)
          mkdir -p "$HOME/.north/config" && echo '{}' > "$HOME/.north/config/projects.json"
          node bin/north.js uninstall --all --yes
          test ! -f "$HOME/.north/run.py"
          test ! -f "$HOME/.codex/prompts/north-focus.md"
          test ! -d "$HOME/.gemini/commands/north"
          ! grep -q "north_hook.py" "$HOME/.claude/settings.json" 2>/dev/null || (echo "hook nao removido"; exit 1)
          test -f "$HOME/.north/config/projects.json"   # dados preservados

  package:
    name: npm tarball is clean (no bytecode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Pack and assert no .pyc / __pycache__
        run: |
          npm pack
          tarball="$(ls north-cli-*.tgz)"
          echo "inspecting $tarball"
          if tar tzf "$tarball" | grep -E "cpython-|__pycache__|\.pyc$"; then
            echo "::error::tarball contains Python bytecode"; exit 1
          fi
          echo "clean: no bytecode in $tarball"
